<svg width="100%" height="80" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#412521;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a45939;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eccf9f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Decorative line -->
  <rect x="0" y="38" width="100%" height="4" fill="url(#lineGradient)" opacity="0.6"/>
  
  <!-- Falling GIF images -->
  <image xlink:href="./images/gif.gif" x="5%" y="10" width="20" height="20" opacity="0.8">
    <animate attributeName="y" from="-20" to="80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="3s" repeatCount="indefinite"/>
  </image>
  
  <image xlink:href="./images/gif.gif" x="15%" y="20" width="18" height="18" opacity="0.7">
    <animate attributeName="y" from="-20" to="80" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="4s" repeatCount="indefinite"/>
  </image>
  
